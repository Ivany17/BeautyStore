<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>BeautyStore</title>
</head>
<body>
    <h1>Beauty Store</h1>
    <div class="form">
        <input type="text" id="productName" placeholder="Name of the product">
        <input type="text" id="productPrice" placeholder="Price of the product">
        <input type="text" id="productImage" placeholder="Image URL">
        <button id="addBtn">Add Product</button>
    </div>
    <div id="productContainer">

    </div>

    <div class="modal-overlay">
        <div class="modal-content">
            <h2>Edit Product</h2>
            <input id="changeName">
            <input id="changePrice">
            <input id="changeImage">
            <button id="saveChangesBtn">Save</button>
            <button id="cancelChangesBtn">Cancel</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
